name: Deploy SkyGrid

on:
  workflow_dispatch:
    inputs:
      deploy_to_ecs:
        description: Deploy to ECS after build and resource checks pass
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: skygrid-deploy
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: skygrid
  ECS_SERVICE: skygrid-service
  ECS_CLUSTER: skygrid-cluster
  ECS_TASK_DEFINITION: .aws/task-definition.json
  CONTAINER_NAME: skygrid
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  deploy-preflight:
    name: SkyGrid build and deployment preflight
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository boundary
        shell: bash
        run: |
          set -euo pipefail
          echo "Canonical SkyGrid deploy repo: MVPuknowme-aura-core/Skygrid"
          echo "Repository from GitHub context: ${GITHUB_REPOSITORY}"
          if [ "${GITHUB_REPOSITORY}" != "MVPuknowme-aura-core/Skygrid" ]; then
            echo "::error title=Wrong deploy repository::SkyGrid deployment must run from MVPuknowme-aura-core/Skygrid."
            exit 1
          fi

      - name: Validate AWS credential configuration
        shell: bash
        run: |
          set -euo pipefail

          has_role="no"
          has_static_keys="no"

          if [ -n "${AWS_ROLE_ARN:-}" ]; then
            has_role="yes"
          fi

          if [ -n "${AWS_ACCESS_KEY_ID:-}" ] && [ -n "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            has_static_keys="yes"
          fi

          echo "SkyGrid AWS credential preflight"
          echo "- AWS_REGION: ${AWS_REGION}"
          echo "- AWS_ROLE_ARN configured: ${has_role}"
          echo "- Static AWS key pair configured: ${has_static_keys}"
          echo "- Canonical deploy repo: MVPuknowme-aura-core/Skygrid"

          if [ "${has_role}" != "yes" ] && [ "${has_static_keys}" != "yes" ]; then
            echo "::error title=Missing AWS credential provider::Configure AWS_ROLE_ARN for OIDC, or configure both AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY in MVPuknowme-aura-core/Skygrid."
            exit 1
          fi

      - name: Configure AWS credentials using OIDC role
        if: env.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: skygrid-ecs-${{ github.run_id }}

      - name: Configure AWS credentials using static keys
        if: env.AWS_ROLE_ARN == '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        shell: bash
        run: |
          set -euo pipefail
          aws sts get-caller-identity

      - name: Confirm or create ECR repository
        shell: bash
        run: |
          set -euo pipefail
          if aws ecr describe-repositories --repository-names "${ECR_REPOSITORY}" >/dev/null 2>&1; then
            echo "ECR repository exists: ${ECR_REPOSITORY}"
          else
            echo "ECR repository missing; creating: ${ECR_REPOSITORY}"
            aws ecr create-repository \
              --repository-name "${ECR_REPOSITORY}" \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256 >/dev/null
          fi

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        id: build-image
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          LATEST_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

          echo "Building SkyGrid image: ${IMAGE_URI}"
          docker build -t "${IMAGE_URI}" -t "${LATEST_URI}" .

          echo "Pushing SkyGrid image to ECR"
          docker push "${IMAGE_URI}"
          docker push "${LATEST_URI}"

          echo "image=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

      - name: Check ECS cluster and service
        id: ecs-check
        shell: bash
        run: |
          set -euo pipefail

          cluster_status="missing"
          service_status="missing"

          if aws ecs describe-clusters --clusters "${ECS_CLUSTER}" --query 'clusters[0].status' --output text 2>/dev/null | grep -q ACTIVE; then
            cluster_status="active"
          fi

          if [ "${cluster_status}" = "active" ]; then
            service_state=$(aws ecs describe-services --cluster "${ECS_CLUSTER}" --services "${ECS_SERVICE}" --query 'services[0].status' --output text 2>/dev/null || true)
            if [ "${service_state}" = "ACTIVE" ]; then
              service_status="active"
            fi
          fi

          echo "ECS cluster status: ${cluster_status}"
          echo "ECS service status: ${service_status}"
          echo "cluster_status=${cluster_status}" >> "${GITHUB_OUTPUT}"
          echo "service_status=${service_status}" >> "${GITHUB_OUTPUT}"

      - name: Confirm task definition file
        id: taskdef-check
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "${ECS_TASK_DEFINITION}" ]; then
            echo "Task definition file found: ${ECS_TASK_DEFINITION}"
            echo "taskdef_file=present" >> "${GITHUB_OUTPUT}"
          else
            echo "Task definition file missing: ${ECS_TASK_DEFINITION}"
            echo "taskdef_file=missing" >> "${GITHUB_OUTPUT}"
          fi

      - name: Render Amazon ECS task definition
        if: ${{ github.event.inputs.deploy_to_ecs == 'true' && steps.ecs-check.outputs.cluster_status == 'active' && steps.ecs-check.outputs.service_status == 'active' && steps.taskdef-check.outputs.taskdef_file == 'present' }}
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to Amazon ECS
        if: ${{ github.event.inputs.deploy_to_ecs == 'true' && steps.ecs-check.outputs.cluster_status == 'active' && steps.ecs-check.outputs.service_status == 'active' && steps.taskdef-check.outputs.taskdef_file == 'present' }}
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deployment boundary summary
        shell: bash
        run: |
          set -euo pipefail
          echo "SkyGrid ECR build stage completed."
          echo "Image pushed: ${{ steps.build-image.outputs.image }}"
          echo "ECS cluster status: ${{ steps.ecs-check.outputs.cluster_status }}"
          echo "ECS service status: ${{ steps.ecs-check.outputs.service_status }}"
          echo "Task definition file: ${{ steps.taskdef-check.outputs.taskdef_file }}"
          echo "Deploy requested: ${{ github.event.inputs.deploy_to_ecs || 'false' }}"
          if [ "${{ github.event.inputs.deploy_to_ecs || 'false' }}" != "true" ]; then
            echo "ECS deploy intentionally skipped. Re-run manually with deploy_to_ecs=true after ECS resources and task definition are ready."
          fi
